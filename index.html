<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fuel Pass Card Generator</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Roboto+Mono:wght@500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-red: #C62828;
            --dark-red: #8E0000;
            --slate-900: #0f172a;
            --slate-700: #334155;
            --white: #ffffff;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f1f5f9;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            margin: 0;
            min-height: 100vh;
        }

        /* UI Input Panel */
        .input-panel {
            background: var(--white);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 400px;
            margin-bottom: 40px;
            border: 1px solid #e2e8f0;
        }

        .input-panel h2 {
            margin-top: 0;
            font-size: 20px;
            color: var(--primary-red);
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-group { margin-bottom: 20px; }
        
        label { 
            display: block; 
            margin-bottom: 8px; 
            font-weight: 600; 
            font-size: 13px;
            color: var(--slate-700);
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #cbd5e1;
            border-radius: 10px;
            font-size: 16px;
            box-sizing: border-box;
            font-weight: 600;
        }

        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
            text-transform: uppercase;
        }

        .btn-generate { background: var(--slate-900); color: white; }
        .btn-generate:hover { background: #000; }
        .btn-generate:disabled { background: #64748b; cursor: not-allowed; }

        /* --- THE PROFESSIONAL CARD DESIGN --- */
        #fuelCard {
            width: 400px;
            height: 620px;
            background: var(--white);
            border-radius: 0;
            overflow: hidden;
            position: relative;
            display: none;
            box-shadow: 0 30px 60px rgba(0,0,0,0.15);
        }

        .header {
            background-color: var(--primary-red);
            height: 220px;
            color: var(--white);
            text-align: center;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        .header h1 { 
            margin: 0; 
            font-size: 40px; 
            font-weight: 900; 
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .vehicle-num { 
            font-size: 22px; 
            font-weight: 400; 
            margin-top: 15px;
            font-family: 'Inter', sans-serif;
        }

        /* QR Section Container */
        .qr-section {
            background: var(--white);
            width: 250px;
            height: 250px;
            margin: -50px auto 0;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            z-index: 10;
            position: relative;
        }

        #qrContainer {
            width: 210px;
            height: 210px;
        }

        #qrContainer img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* Vertical Side Text */
        .side-code {
            position: absolute;
            right: 15px;
            top: 330px;
            transform: rotate(90deg);
            transform-origin: right top;
            font-family: 'Roboto Mono', monospace;
            font-size: 13px;
            font-weight: bold;
            color: #475569;
            letter-spacing: 2px;
            white-space: nowrap;
        }

        /* Footer with 3 Logos */
        .footer {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 100px;
            background: #f8fafc;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 0 20px;
            box-sizing: border-box;
            border-top: 1px solid #e2e8f0;
        }

        .logo-box {
            text-align: center;
            flex: 1;
            display: flex;
            justify-content: center;
        }

        .logo-box img {
            height: 45px;
            max-width: 80px;
            object-fit: contain;
            opacity: 1 !important; 
        }

        .v-divider {
            width: 1px;
            height: 40px;
            background-color: #cbd5e1;
        }

        #downloadBtn {
            margin-top: 30px;
            background: #059669;
            color: white;
            width: 400px;
            display: none;
        }

        #downloadBtn:hover { background: #047857; }

        /* Page Footer Styling */
        .page-footer {
            margin-top: auto;
            padding-top: 40px;
            color: #64748b;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        .page-footer span {
            color: var(--slate-900);
            font-weight: 900;
        }

    </style>
</head>
<body>

    <div class="input-panel">
        <h2>Fuel Pass Setup</h2>
        <div class="input-group">
            <label>වාහන අංකය (Vehicle Number)</label>
            <input type="text" id="vNo" placeholder="EX: WP CAS-5552">
        </div>
        <div class="input-group">
            <label>QR කේතය සහිත පින්තූරය ලබා දෙන්න</label>
            <input type="file" id="qrFile" accept="image/*">
        </div>
        <button class="btn btn-generate" id="generateBtn" onclick="generateCard()">Generate Card</button>
    </div>

    <div id="fuelCard">
        <div class="header">
            <h1>National Fuel Pass</h1>
            <div class="vehicle-num" id="displayVNo"></div>
        </div>
        
        <div class="qr-section">
            <div id="qrContainer"></div>
        </div>

        <div class="side-code" id="sideCodeDisplay"></div>

        <div class="footer">
            <div class="logo-box">
                <img src="https://ceypetco.gov.lk/wp-content/uploads/2024/02/Ceylon_Petroleum_Corporation_logo.ico" alt="Ceypetco">
            </div>
            <div class="v-divider"></div>
            <div class="logo-box">
                <img src="https://www.lankaioc.com/wp-content/uploads/2018/02/cropped-ioc.png" alt="Lanka IOC">
            </div>
            <div class="v-divider"></div>
            <div class="logo-box">
                <img src="https://upload.wikimedia.org/wikipedia/en/archive/4/41/20250710060822%21Sinopec.svg" alt="Sinopec">
            </div>
        </div>
    </div>

    <button id="downloadBtn" class="btn">Download Card</button>

    <div class="page-footer">
        Ⓗ Design by <span> <a href="https://facebook.com/hansana.hiransha" target="_blank"> Hansana Hiransha </a></span>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <script>
        function generateCard() {
            const vNo = document.getElementById('vNo').value.trim();
            const qrFile = document.getElementById('qrFile').files[0];
            const btn = document.getElementById('generateBtn');
            
            if (!vNo || !qrFile) {
                alert("කරුණාකර වාහන අංකය සහ QR රූපය ලබා දෙන්න.");
                return;
            }

            btn.innerText = "Scanning QR...";
            btn.disabled = true;

            document.getElementById('displayVNo').innerText = vNo;

            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    // Create a canvas to read the image data
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = img.width;
                    canvas.height = img.height;
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    
                    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    
                    // Decode the QR using jsQR
                    const code = jsQR(imageData.data, imageData.width, imageData.height, {
                        inversionAttempts: "dontInvert",
                    });

                    if (code) {
                        const qrText = code.data;
                        
                        // Set the extracted text to the side-code area
                        document.getElementById('sideCodeDisplay').innerText = qrText;

                        // Generate a brand NEW, clean QR code inside the container
                        const qrContainer = document.getElementById('qrContainer');
                        qrContainer.innerHTML = ""; // Clear existing
                        
                        new QRCode(qrContainer, {
                            text: qrText,
                            width: 210,
                            height: 210,
                            colorDark : "#000000",
                            colorLight : "#ffffff",
                            correctLevel : QRCode.CorrectLevel.H
                        });

                        // Show UI Elements
                        document.getElementById('fuelCard').style.display = 'block';
                        document.getElementById('downloadBtn').style.display = 'block';
                        
                        // Scroll down to the card
                        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
                    } else {
                        alert("ඔබ ලබා දුන් QR පින්තූරය පද්ධතියට කියවිය නොහැක. කරුණාකර වඩාත් පැහැදිලි Screenshot එකක් ලබා දෙන්න.");
                    }
                    
                    btn.innerText = "Generate Card";
                    btn.disabled = false;
                };
                img.src = e.target.result;
            }
            reader.readAsDataURL(qrFile);
        }

        // HD Download Feature
        document.getElementById('downloadBtn').addEventListener('click', function() {
            const card = document.getElementById('fuelCard');
            const btn = this;
            
            btn.innerText = "Generating HD Image...";
            btn.disabled = true;

            html2canvas(card, { 
                useCORS: true,
                scale: 4, 
                logging: false,
                letterRendering: 1,
                allowTaint: false,
                backgroundColor: "#ffffff"
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'FuelPass_' + document.getElementById('displayVNo').innerText + '.png';
                link.href = canvas.toDataURL('image/png', 1.0);
                link.click();
                
                btn.innerText = "Download Professional HD Card";
                btn.disabled = false;
            });
        });
    </script>

</body>
</html>
